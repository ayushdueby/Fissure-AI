services:
  - type: web
    name: fissure-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile

    envVars:
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://fissure-frontend.onrender.com,https://*.onrender.com

      - key: OLLAMA_BASE_URL
        sync: false

      - key: OLLAMA_MODEL
        value: llama3